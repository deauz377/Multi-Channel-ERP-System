{% extends 'base.html' %}

{% block title %}{{ title }} - RealKuku ERP{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-8">
        <h1><i class="bi bi-cash-flow"></i> {{ title }}</h1>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form method="post" novalidate>
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label>{{ form.category.label }}</label>
                        {{ form.category }}
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label>{{ form.date.label }}</label>
                        {{ form.date }}
                    </div>
                </div>
            </div>
            <div class="mb-3">
                <label>{{ form.description.label }}</label>
                {{ form.description }}
            </div>
            <div class="mb-3">
                <label>{{ form.amount.label }}</label>
                {{ form.amount }}
            </div>
            <div class="mb-3">
                <label>{{ form.business.label }}</label>
                {{ form.business }}
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle"></i> Save</button>
                <a href="{% url 'expenses:expense_list' %}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Back</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
