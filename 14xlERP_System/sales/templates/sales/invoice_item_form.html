{% extends 'base.html' %}

{% block title %}Add Item to Invoice - RealKuku ERP{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-8">
        <h1><i class="bi bi-list"></i> Add Item to Invoice #{{ invoice.id }}</h1>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form method="post" novalidate>
            {% csrf_token %}
            <div class="mb-3">
                <label>{{ form.product.label }}</label>
                {{ form.product }}
            </div>
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label>{{ form.qty.label }}</label>
                        {{ form.qty }}
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label>{{ form.price.label }}</label>
                        {{ form.price }}
                    </div>
                </div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success"><i class="bi bi-check-circle"></i> Add Item</button>
                <a href="{% url 'sales:invoice_detail' invoice.pk %}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Back</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
