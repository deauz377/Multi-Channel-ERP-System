{% extends 'base.html' %}

{% block title %}Record Payment - RealKuku ERP{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-8">
        <h1><i class="bi bi-cash-coin"></i> Record Payment - Invoice #{{ invoice.id }}</h1>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form method="post" novalidate>
            {% csrf_token %}
            <div class="alert alert-info">
                Outstanding: <strong>KES {{ invoice.total|add:invoice.paid|stringformat:".2f" }}</strong>
            </div>
            <div class="mb-3">
                <label>{{ form.method.label }}</label>
                {{ form.method }}
            </div>
            <div class="mb-3">
                <label>{{ form.amount.label }}</label>
                {{ form.amount }}
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success"><i class="bi bi-check-circle"></i> Record Payment</button>
                <a href="{% url 'sales:invoice_detail' invoice.pk %}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Back</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
