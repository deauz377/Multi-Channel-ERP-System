{% extends 'base.html' %}

{% block title %}{{ title }} - RealKuku ERP{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-8">
        <h1><i class="bi bi-truck"></i> {{ title }}</h1>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form method="post" novalidate>
            {% csrf_token %}
            <div class="mb-3">
                <label>{{ form.name.label }}</label>
                {{ form.name }}
            </div>
            <div class="mb-3">
                <label>{{ form.contact.label }}</label>
                {{ form.contact }}
            </div>
            <div class="mb-3">
                <label>{{ form.business.label }}</label>
                {{ form.business }}
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle"></i> Save</button>
                <a href="{% url 'inventory:supplier_list' %}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Back</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
